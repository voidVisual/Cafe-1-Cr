# ─────────────────────────────────────────────────────────────────────────────
#  Cafe 1 Cr  —  Production Nginx Reverse Proxy
#  Handles: Rate limiting · Security Headers · Gzip · Caching · API Proxy
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;                        # hide nginx version

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ── Rate Limiting Zones ──────────────────────────────────────────────────
    # General site traffic: 30 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # API endpoints: 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;

    # Fast polling zone: 20 requests/sec (for 500ms order status polling)
    limit_req_zone $binary_remote_addr zone=status:10m   rate=20r/s;

    # Order placement: 2 requests/sec per IP (strict — prevent spam)
    limit_req_zone $binary_remote_addr zone=orders:10m   rate=2r/s;

    # Limit response for violations
    limit_req_status 429;

    # ── Proxy Caching (only for truly static endpoints like /api/menu) ───────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    # ── Upstream Services ────────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:80;
        keepalive 16;
    }

    # ── Main Server Block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options    "nosniff"                       always;
        add_header X-XSS-Protection          "1; mode=block"                 always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';"
            always;

        # ── Client Body Limits ───────────────────────────────────────────────
        client_max_body_size  5m;
        client_body_timeout   12s;
        client_header_timeout 12s;
        send_timeout          10s;

        # ─────────────────────────────────────────────────────────────────────
        #  Order STATUS — NEVER cache (polled every 500ms for real-time updates)
        # ─────────────────────────────────────────────────────────────────────
        location ~ ^/api/orders/ {
            limit_req zone=status burst=40 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Critical: no caching for real-time order data
            proxy_cache_bypass  1;
            proxy_no_cache      1;
            add_header          Cache-Control "no-store, no-cache, must-revalidate" always;
            expires             off;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }

        # ─────────────────────────────────────────────────────────────────────
        #  Admin endpoints — NEVER cache
        # ─────────────────────────────────────────────────────────────────────
        location ~ ^/api/admin/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_cache_bypass  1;
            proxy_no_cache      1;
            add_header          Cache-Control "no-store" always;
            expires             off;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ─────────────────────────────────────────────────────────────────────
        #  Order placement — strict rate limit (2 req/s, burst 5)
        # ─────────────────────────────────────────────────────────────────────
        location ~ ^/api/(order|payment) {
            limit_req zone=orders burst=5 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_cache_bypass  1;
            proxy_no_cache      1;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ─────────────────────────────────────────────────────────────────────
        #  General API — cache only /api/menu (static-ish, 2 min TTL)
        # ─────────────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_cache         api_cache;
            proxy_cache_methods GET;
            proxy_cache_valid   200 2m;
            proxy_cache_bypass  $http_cache_control;
            add_header          X-Cache-Status $upstream_cache_status always;
        }

        # ─────────────────────────────────────────────────────────────────────
        #  Frontend — everything else
        # ─────────────────────────────────────────────────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass         http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Static asset caching (hashed filenames from Vite)
            location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend_app;
                expires    30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ── Block hidden files (.git, .env, etc.) ────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Custom error pages ───────────────────────────────────────────────
        error_page 429 /429.html;
        location = /429.html {
            return 429 '{"error":"Too many requests. Please slow down."}';
            add_header Content-Type application/json always;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable."}';
            add_header Content-Type application/json always;
        }
    }
}
