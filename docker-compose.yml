version: '3.8'

services:
  api:
    build:
      context: ./api
    container_name: cafe_api
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - MONGODB_URI=mongodb://mongo:27017
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: cafe_frontend
    restart: unless-stopped
    depends_on:
      - api

  mongo:
    image: mongo:7
    container_name: cafe_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: cafe_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api
    restart: unless-stopped

volumes:
  mongo_data:
