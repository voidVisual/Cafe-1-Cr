services:
  mongo:
    image: mongo:7
    container_name: cafe_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ./api
    container_name: cafe_api
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - MONGODB_URI=mongodb://mongo:27017
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin123}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      # Use Python (always available) instead of curl (not in slim image)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/menu')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    container_name: cafe_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    container_name: cafe_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: cafe_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Run manually, e.g.:
    # docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d cafe1cr.food -d www.cafe1cr.food --agree-tos --register-unsafely-without-email

volumes:
  mongo_data:
